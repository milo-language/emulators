name: release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # No darwin-x64: the free macos-13 Intel runner image was retired and
          # queues forever. Matches the compiler repo's own matrix.
          - os: macos-latest
            target: darwin-arm64
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Track the compiler's rolling build rather than pinning a version: a
      # language change that breaks these cores should fail here loudly, not rot
      # silently behind a pin.
      - name: install milo
        run: |
          curl -fsSL -o milo.tar.gz \
            "https://github.com/milo-language/milo/releases/download/latest/milo-${{ matrix.target }}.tar.gz"
          tar xzf milo.tar.gz
          chmod +x milo
          echo "$PWD" >> "$GITHUB_PATH"

      # Homebrew's `sdl2` formula now resolves to sdl2-compat, a shim over SDL3
      # that ships only a dylib — no libSDL2.a for --static-deps to link. So on
      # macOS build real SDL2 from source. Debian's libsdl2-dev still ships the
      # static archive, so apt is fine on linux.
      - name: install SDL2 (static archive required)
        env:
          SDL_VERSION: 2.32.10
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            command -v cmake >/dev/null || brew install cmake
            curl -fsSL -o sdl.tar.gz \
              "https://github.com/libsdl-org/SDL/releases/download/release-${SDL_VERSION}/SDL2-${SDL_VERSION}.tar.gz"
            tar xzf sdl.tar.gz
            cmake -S "SDL2-${SDL_VERSION}" -B sdlbuild \
              -DCMAKE_INSTALL_PREFIX=/opt/homebrew \
              -DCMAKE_BUILD_TYPE=Release -DSDL_STATIC=ON -DSDL_SHARED=OFF
            cmake --build sdlbuild --parallel
            cmake --install sdlbuild
            test -f /opt/homebrew/lib/libSDL2.a || { echo "no static archive produced"; exit 1; }
          else
            sudo apt-get update
            sudo apt-get install -y libsdl2-dev
          fi

      # --static-deps links libSDL2.a into each binary, so a user downloading a
      # release does not need SDL2 installed. SDL2 is zlib-licensed, so static
      # linking carries no distribution obligation.
      #
      # Output goes to dist/ because `-o nes` would collide with the nes/ source
      # directory — ld reports "cannot open output file nes: Is a directory".
      - name: build cores
        run: |
          mkdir -p dist
          for core in nes snes genesis; do
            milo build "$core/$core.milo" -o "dist/$core" --release --static-deps
          done
          milo build menu.milo -o dist/menu --release --static-deps

      # The whole point of the release is a binary that runs on a bare machine.
      # If SDL ever comes back as a dynamic dep, fail rather than ship it.
      - name: verify binaries carry no SDL runtime dependency
        run: |
          for b in dist/nes dist/snes dist/genesis dist/menu; do
            if [ "$RUNNER_OS" = "macOS" ]; then
              deps=$(otool -L "$b")
            else
              deps=$(ldd "$b")
            fi
            if printf '%s' "$deps" | grep -qi 'libsdl'; then
              echo "ERROR: $b links SDL dynamically — --static-deps did not take"
              printf '%s\n' "$deps"
              exit 1
            fi
          done
          echo "all four binaries are SDL-free"

      - name: package
        run: |
          cp README.md dist/
          tar czf "milo-emulators-${{ matrix.target }}.tar.gz" -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: milo-emulators-${{ matrix.target }}
          path: milo-emulators-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - run: ls -lh milo-emulators-*.tar.gz
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Rolling release from the latest passing commit on main.

            Each archive holds the `nes`, `snes`, and `genesis` cores plus the
            `menu` front-end. SDL2 is statically linked, so nothing needs
            installing — download, extract, run. ROMs are not included.
          prerelease: true
          make_latest: true
          files: milo-emulators-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
